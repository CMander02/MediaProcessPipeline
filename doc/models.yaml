# MediaProcessPipeline 模型下载配置
# 每个模型都提供 HuggingFace 和 ModelScope 两个下载源
# ModelScope 在国内访问更快，推荐优先使用

# ============================================================================
# WhisperX 语音识别模型
# ============================================================================
whisper-large-v3:
  description: OpenAI Whisper 大模型，支持多语言语音识别
  size: ~3GB
  huggingface: openai/whisper-large-v3
  modelscope: iic/Whisper-large-v3
  modelscope_revision: v2.0.5
  usage: |
    # HuggingFace (whisperx 默认)
    import whisperx
    model = whisperx.load_model("large-v3", device="cuda")

    # ModelScope
    from modelscope.pipelines import pipeline
    from modelscope.utils.constant import Tasks
    pipe = pipeline(
        task=Tasks.auto_speech_recognition,
        model='iic/Whisper-large-v3',
        model_revision="v2.0.5"
    )

faster-whisper-large-v3:
  description: CTranslate2 优化版 Whisper，推理速度更快
  size: ~3GB
  huggingface: Systran/faster-whisper-large-v3
  modelscope: keepitsimple/faster-whisper-large-v3
  usage: |
    # HuggingFace
    from faster_whisper import WhisperModel
    model = WhisperModel("large-v3", device="cuda", compute_type="float16")

    # ModelScope 下载后本地加载
    from modelscope import snapshot_download
    model_dir = snapshot_download('keepitsimple/faster-whisper-large-v3')

whisper-large-v3-turbo:
  description: Whisper large-v3 的快速版本，速度提升 8 倍
  size: ~1.5GB
  huggingface: openai/whisper-large-v3-turbo
  modelscope: iic/Whisper-large-v3-turbo
  usage: |
    import whisperx
    model = whisperx.load_model("large-v3-turbo", device="cuda")

# ============================================================================
# Pyannote 说话人分离模型 (需要 HF Token 或使用 ModelScope 替代)
# ============================================================================
pyannote-speaker-diarization-3.1:
  description: 说话人分离管道，识别"谁在什么时候说话"
  size: ~200MB
  huggingface: pyannote/speaker-diarization-3.1
  modelscope: pyannote/speaker-diarization-3.1
  requires_agreement: true  # 需要在 HuggingFace 接受使用条款
  usage: |
    # HuggingFace (需要 HF_TOKEN)
    from pyannote.audio import Pipeline
    pipeline = Pipeline.from_pretrained(
        "pyannote/speaker-diarization-3.1",
        use_auth_token="YOUR_HF_TOKEN"
    )
    diarization = pipeline("audio.wav")

pyannote-segmentation-3.0:
  description: 语音分割模型，检测语音活动和重叠语音
  size: ~50MB
  huggingface: pyannote/segmentation-3.0
  modelscope: ModelBulider/segmentation-3.0
  requires_agreement: true
  usage: |
    # 通常作为 speaker-diarization 的依赖自动加载

# ============================================================================
# ModelScope 3D-Speaker (pyannote 的国内替代方案，无需 HF Token)
# ============================================================================
speech_campplus_sv_zh-cn_16k-common:
  description: CAM++ 说话人嵌入模型，用于说话人分离
  size: ~100MB
  huggingface: null  # 仅在 ModelScope
  modelscope: damo/speech_campplus_sv_zh-cn_16k-common
  modelscope_revision: v1.0.0
  usage: |
    from modelscope.pipelines import pipeline
    sv_pipeline = pipeline(
        task='speaker-verification',
        model='damo/speech_campplus_sv_zh-cn_16k-common',
        model_revision='v1.0.0'
    )

speech_eres2net_sv_zh-cn_16k-common:
  description: ERes2Net 说话人嵌入模型
  size: ~100MB
  huggingface: null
  modelscope: iic/speech_eres2net_sv_zh-cn_16k-common
  usage: |
    from modelscope import snapshot_download
    model_dir = snapshot_download('iic/speech_eres2net_sv_zh-cn_16k-common')

speech_fsmn_vad_zh-cn-16k-common-pytorch:
  description: FSMN 语音活动检测 (VAD) 模型
  size: ~50MB
  huggingface: null
  modelscope: iic/speech_fsmn_vad_zh-cn-16k-common-pytorch
  modelscope_revision: v2.0.4
  usage: |
    # ModelScope Pipeline
    from modelscope.pipelines import pipeline
    from modelscope.utils.constant import Tasks
    vad_pipeline = pipeline(
        task=Tasks.voice_activity_detection,
        model='iic/speech_fsmn_vad_zh-cn-16k-common-pytorch',
        model_revision="v2.0.4"
    )

    # FunASR
    from funasr import AutoModel
    model = AutoModel(model="fsmn-vad", model_revision="v2.0.4")

